<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
    
    <input type="text" name="" id="" placeholder="Digite seu Nome completo">
    <input type="email" name="" id="" placeholder="Digite seu endereço de email">
    <input type="password" name="" id="" placeholder="Digite sua senha">
    <input type="date" name="" id="">
    <input type="number" name="" id="" min="1" max="120" placeholder="Digite sua idade">
    <input type="text" name="" id="" placeholder="Sua cor favorita?">
    <label for="genero">Gênero:</label>
<select id="genero" name="genero">
  <option value="masculino">Masculino</option>
  <option value="feminino">Feminino</option>
  <option value="outro">Outro</option>
</select>
<input type="text" name="" id="" placeholder="Quais seus interesses?">
<input type="file" name="" id="">
</body>
</html>
